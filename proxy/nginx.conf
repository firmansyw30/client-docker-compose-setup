#events {}
http {
    # ==========================================
    # 1. UPSTREAMS
    # ==========================================

    # --- Client 1 ---
    upstream client1_backend_nodejs_main {
        server client-geoserver-nodejs-1:4004;
        keepalive 32;
    }
    upstream client1_backend_bun {
        server client-geoserver-bunjs-1:4005;
        keepalive 32;
    }
    upstream client1_backend_nodejs_rf {
        server client-geoserver-nodejs-refactoring-1:4006;
        keepalive 32;
    }

    # --- Client 2 ---
    upstream client2_backend_nodejs_main {
        server client-geoserver-nodejs-2:4004;
        keepalive 32;
    }
    upstream client2_backend_bun {
        server client-geoserver-bunjs-2:4005;
        keepalive 32;
    }
    upstream client2_backend_nodejs_rf {
        server client-geoserver-nodejs-refactoring-2:4006;
        keepalive 32;
    }

    # ==========================================
    # 2. HTTP SERVERS (Port 80)
    # ==========================================

    # Client 1 Redirect
    server {
        listen 80;
        server_name your-server-1-domain.xyz;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # Client 2 Redirect (Use this for Certbot verification)
    server {
        listen 80;
        server_name your-server-2-domain.xyz;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ==========================================
    # 3. HTTPS SERVER (Port 443)
    # ==========================================

    # Client 1 Redirect
    server {
        listen 443 ssl;
        server_name your-server-1-domain.xyz;

        # This ssl command is automatically generated after generating SSL in terminal using command that provided in README.md
        ssl_certificate /etc/letsencrypt/live/your-server-1-domain.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-server-1-domain.xyz/privkey.pem;

        # SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy Headers
        client_max_body_size 200M;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header accesstoken $http_accesstoken;

        # Routing Rules
        location ~ ^/(auth_bun|moneys_bun|sini_v2|sheets|mapid_ai) {
            proxy_pass http://client1_backend_bun;
        }
        location ~ ^/(mobile|admin_mobile|events|maluku|blog_ai|basemap|gps|academy) {
            proxy_pass http://client1_backend_nodejs_rf;
        }
        location ~ ^/(upload|layers|layers_new) {
            proxy_pass http://client1_backend_nodejs_main;
        }
        location / {
            proxy_pass http://client1_backend_nodejs_main;
        }
    }

    # Client 2 Redirect
    server {
        listen 443 ssl;
        server_name your-server-2-domain.xyz;

        ssl_certificate /etc/letsencrypt/live/your-server-2-domain.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-server-2-domain.xyz/privkey.pem;

        # SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy Headers
        client_max_body_size 200M;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header accesstoken $http_accesstoken;

        # Routing Rules
        location ~ ^/(auth_bun|moneys_bun|sini_v2|sheets|mapid_ai) {
            proxy_pass http://client2_backend_bun;
        }
        location ~ ^/(mobile|admin_mobile|events|maluku|blog_ai|basemap|gps|academy) {
            proxy_pass http://client2_backend_nodejs_rf;
        }
        location ~ ^/(upload|layers|layers_new) {
            proxy_pass http://client2_backend_nodejs_main;
        }
        location / {
            proxy_pass http://client2_backend_nodejs_main;
        }
    }
}
